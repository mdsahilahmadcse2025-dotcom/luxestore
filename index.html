<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuxeStore</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    background:#000;
    color:white;
    overflow-x:hidden;
}

nav{
    position:fixed;
    width:100%;
    top:0;
    backdrop-filter:blur(20px);
    background:rgba(0,0,0,.7);
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    z-index:100;
}

.logo{
    font-size:28px;
    font-weight:700;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:5rem;
    background:linear-gradient(90deg,#fff,#888);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    margin-top:20px;
    font-size:1.3rem;
    color:#aaa;
}

.btn{
    margin-top:30px;
    padding:15px 35px;
    border-radius:40px;
    background:white;
    color:black;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:80px 8%;
}

.card{
    background:#111;
    border-radius:30px;
    overflow:hidden;
    transition:.4s;
}

.card:hover{
    transform:translateY(-12px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.content{
    padding:25px;
}

.content h2{
    margin-bottom:10px;
}

.price{
    color:#ccc;
    margin:15px 0;
}

.buy{
    display:inline-block;
    padding:12px 25px;
    border-radius:25px;
    background:white;
    color:black;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:50px;
    color:#777;
}

@media(max-width:768px){
.hero h1{
    font-size:3rem;
}
}
</style>
</head>

<body>

<nav>
    <div class="logo">LuxeStore</div>

    <ul>
        <li>Home</li>
        <li>Products</li>
        <li>About</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <h1>Think Different.</h1>
    <p>Premium technology crafted for the future.</p>
    <a href="#products" class="btn">Explore</a>
</section>

<section class="products" id="products">

<div class="card">
    <img src="https://picsum.photos/600/400?1">
    <div class="content">
        <h2>SmartPhone Pro</h2>
        <p class="price">₹79,999</p>
        <a href="#" class="buy">Buy Now</a>
    </div>
</div>

<div class="card">
    <img src="https://picsum.photos/600/400?2">
    <div class="content">
        <h2>Ultra Laptop</h2>
        <p class="price">₹1,19,999</p>
        <a href="#" class="buy">Buy Now</a>
    </div>
</div>

<div class="card">
    <img src="https://picsum.photos/600/400?3">
    <div class="content">
        <h2>Wireless Pods</h2>
        <p class="price">₹14,999</p>
        <a href="#" class="buy">Buy Now</a>
    </div>
</div>

</section>

<footer>
    © 2026 LuxeStore. All Rights Reserved.
</footer>

</body>
</html>
